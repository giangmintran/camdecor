name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject runtime variables
        env:
          GOOGLE_SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}
        run: |
          if [ -z "$GOOGLE_SHEET_WEBHOOK_URL" ]; then
            echo "Secret GOOGLE_SHEET_WEBHOOK_URL is missing"
            exit 1
          fi

          sed -i "s|__GOOGLE_SHEET_WEBHOOK_URL__|$GOOGLE_SHEET_WEBHOOK_URL|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
